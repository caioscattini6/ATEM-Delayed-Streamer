name: Build macOS Unsigned DMG

on:
  workflow_dispatch: # This allows you to trigger the build manually with a button click

jobs:
  build-mac:
    runs-on: macos-latest # This provisions the temporary cloud Mac

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # <-- UPDATED to v4 to clear warning

      - name: Setup Node.js
        uses: actions/setup-node@v4 # <-- UPDATED to v4 to clear warning
        with:
          node-version: '18' # Your app's Node version

      - name: Install Dependencies
        run: npm install

      - name: Make FFmpeg Executable
        run: chmod +x bin/ffmpeg

      - name: Build Unsigned Mac App
        run: npm run build:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false # <-- ADDED to prevent unsigned build crashes

      - name: Upload DMG as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ATEM-Delayed-Streamer-Mac
          path: dist/*.dmg # This grabs the generated DMG from electron-builder
          if-no-files-found: warn # Optional: warns you if the path is wrong instead of silently passing
